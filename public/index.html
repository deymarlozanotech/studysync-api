<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusFix - Dashboard en Tiempo Real</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    h1 { text-align: center; color: #0f3460; margin-bottom: 30px; font-size: 2rem; }
    h1 span { color: #e94560; }
    #status { text-align: center; margin-bottom: 20px; padding: 10px; border-radius: 8px; font-weight: bold; }
    .connected { background: #1b4332; color: #95d5b2; }
    .disconnected { background: #4a0e0e; color: #e5989b; }
    #alerts { display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 0 auto; }
    .card { background: #16213e; border-left: 5px solid #0f3460; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); animation: slideIn 0.3s ease-out; }
    .card.nuevo { border-left-color: #e94560; }
    .card.actualizado { border-left-color: #f9c74f; }
    .card h3 { margin-bottom: 10px; font-size: 1.1rem; }
    .card .meta { display: flex; gap: 15px; flex-wrap: wrap; font-size: 0.85rem; color: #a0a0b0; margin-bottom: 8px; }
    .card .meta span { background: #0f3460; padding: 3px 8px; border-radius: 4px; }
    .card p { line-height: 1.5; color: #c0c0d0; }
    .estado { display: inline-block; padding: 4px 12px; border-radius: 12px; font-weight: bold; font-size: 0.85rem; }
    .PENDIENTE { background: #e94560; color: white; }
    .EN_PROCESO { background: #f9c74f; color: #333; }
    .RESUELTO { background: #2d6a4f; color: white; }
    .timestamp { font-size: 0.75rem; color: #707090; margin-top: 10px; }
    #empty { text-align: center; color: #505070; padding: 40px; font-style: italic; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <h1>Campus<span>Fix</span> - Reportes en Vivo</h1>
  <div id="status" class="disconnected">Desconectado del servidor</div>
  <div id="alerts">
    <div id="empty">Esperando reportes...</div>
  </div>

  <script>
    // Forzamos la conexión directa usando el transporte WebSocket nativo de tu puerto local
    const socket = io({
      transports: ['websocket', 'polling'],
      upgrade: true
    });

    const alertsDiv = document.getElementById('alerts');
    const statusDiv = document.getElementById('status');
    const emptyDiv = document.getElementById('empty');

    socket.on('connect', () => {
      statusDiv.textContent = 'Conectado al servidor CampusFix';
      statusDiv.className = 'connected';
      console.log('¡Conexión Socket.io establecida con éxito!');
    });

    socket.on('disconnect', () => {
      statusDiv.textContent = 'Desconectado del servidor';
      statusDiv.className = 'disconnected';
    });

    // Manejo de errores en la consola para ayudarte en la demo
    socket.on('connect_error', (err) => {
      console.error('Error de conexión con Socket.io:', err.message);
    });

    function addCard(title, data, type) {
      if (emptyDiv) emptyDiv.style.display = 'none';

      const card = document.createElement('div');
      card.className = `card ${type}`;

      // Extraemos los datos dinámicos mapeados desde Redis Pub/Sub
      const estadoLabel = data.estado || data.estadoNuevo || 'PENDIENTE';
      const ubicacion = data.ubicacion || 'No especificada';
      const tipoDano = data.tipoDano || 'No especificado';
      const descripcion = data.descripcion || (data.estadoAnterior
        ? `Estado cambiado de ${data.estadoAnterior} a ${data.estadoNuevo}`
        : 'Sin descripción');

      let metaHtml = `<div class="meta">`;
      metaHtml += `<span>${tipoDano}</span>`;
      metaHtml += `<span>${ubicacion}</span>`;
      if (data.actualizadoPor) {
        metaHtml += `<span>Por: ${data.actualizadoPor}</span>`;
      }
      metaHtml += `</div>`;

      card.innerHTML = `
        <h3>${title}</h3>
        ${metaHtml}
        <p>${descripcion}</p>
        <div class="timestamp">
          <span class="estado ${estadoLabel}">${estadoLabel}</span>
          <span style="margin-left: 10px;">${new Date().toLocaleString('es-BO')}</span>
        </div>
      `;

      alertsDiv.insertBefore(card, alertsDiv.firstChild);

      if (alertsDiv.children.length > 50) {
        alertsDiv.removeChild(alertsDiv.lastChild);
      }
    }

    // Escuchadores de Canales Redis oficiales exigidos por el M.Sc. Requena
    socket.on('campus:reporte:nuevo', (event) => {
      // Si la respuesta viene envuelta en un objeto payload de Redis
      const reportData = event.payload || event;
      addCard('Nuevo Reporte de Daño', reportData, 'nuevo');
    });

    socket.on('campus:estado:actualizado', (event) => {
      const reportData = event.payload || event;
      addCard('Estado de Reporte Actualizado', reportData, 'actualizado');
    });
  </script>
</body>
</html>
